name: Deploy VLESS
on:
  workflow_dispatch:
    inputs:
      sso_url:
        description: 'SSO Link'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright requests
          # تثبيت متصفح فايرفوكس مع كافة التبعات الضرورية لنظام لينكس
          playwright install --with-deps firefox

      - name: Run Playwright Script
        env:
          SSO_URL: ${{ github.event.inputs.sso_url }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python run_deploy.py
